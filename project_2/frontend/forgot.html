<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KvaultX</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }
        
        .forgot-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .forgot-card {
            width: 100%;
            max-width: 440px;
            background: rgba(11, 22, 19, 0.7);
            border: 1px solid rgba(22, 48, 42, 0.5);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            animation: cardEntrance 0.65s cubic-bezier(0.22, 1, 0.36, 1);
            text-align: center;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(28px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .forgot-brand {
            text-align: center;
            margin-bottom: 26px;
        }

        .forgot-brand-logo {
            height: 64px;
            width: auto;
            margin: 0 auto 12px;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 4px 14px rgba(0, 210, 255, 0.45));
        }

        .forgot-brand h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #00d2ff, #928dab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .forgot-subtitle {
            font-size: 13.5px;
            color: #a6bba8;
            font-weight: 300;
            margin-top: 4px;
        }

        .field-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-size: 12.5px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 6px;
        }

        .signup-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13.5px;
            color: rgba(255, 255, 255, 0.7);
            padding-top: 18px;
            border-top: 1px solid rgba(22, 48, 42, 0.3);
        }

        .password-box {
            position: relative;
            width: 100%;
        }

        .password-box input {
            padding-right: 44px;
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 17px;
            user-select: none;
            opacity: 0.75;
            transition: opacity 0.2s ease;
        }

        .toggle-eye:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="login-page">

    <div class="forgot-wrapper">
        <div class="forgot-card">
            
            <div class="forgot-brand">
                <img src="assets/logo.png" alt="KvaultX Logo" class="forgot-brand-logo">
                <h2>KvaultX Password Reset</h2>
                <p class="forgot-subtitle">Verify your registered email with a one-time code to set a new password.</p>
            </div>

            <form id="forgotForm" style="background: transparent; border: none; padding: 0; box-shadow: none; backdrop-filter: none; animation: none; width: 100%;">
                
                <div class="field-group">
                    <label class="field-label" for="forgotMobile">Registered Email Address</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="email" id="forgotMobile" placeholder="user@example.com" required style="flex: 1; margin: 0;">
                        <button id="sendOtpBtn" type="button" style="width: auto; margin-top: 0; padding: 12px 18px; font-size: 13.5px; white-space: nowrap; display: flex; align-items: center; gap: 6px;">
                            ⚡ Send OTP
                        </button>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="otpInput">One-time Verification Code</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="password" id="otpInput" placeholder="Enter 6-digit code" required style="flex: 1; margin: 0;">
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label" for="newPassword">New Chosen Password</label>
                    <div class="password-box">
                        <input type="password" id="newPassword" placeholder="Enter your new master password" required>
                        <span id="toggleNewPass" class="toggle-eye" onclick="togglePassField()">👁</span>
                    </div>
                </div>

                <button id="resetPassBtn" type="button" style="margin-top: 8px;">Reset Password</button>

            </form>

            <p class="signup-hint">
                Remembered it? <a href="pages/login.html" style="color: #10b981; text-decoration: underline;">Back to sign in</a>
            </p>

        </div>
    </div>

    <footer class="forgot-footer" style="text-align: center; padding: 16px; font-size: 13px; color: rgba(255, 255, 255, 0.5); border-top: 1px solid rgba(255, 255, 255, 0.08); margin-top: 40px; position: relative; bottom: 0; width: 100%;">
        © 2026 KvaultX. All rights reserved.
    </footer>

    <script src="script.js"></script>
    <script>
        function togglePassField() {
            const input = document.getElementById("newPassword");
            const eye = document.getElementById("toggleNewPass");
            if (input.type === "password") {
                input.type = "text";
                eye.textContent = "🙈";
            } else {
                input.type = "password";
                eye.textContent = "👁";
            }
        }
    </script>
</body>
</html>
