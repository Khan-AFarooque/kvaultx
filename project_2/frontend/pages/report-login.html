<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Security Incident | KvaultX</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            --card-bg: rgba(30, 41, 59, 0.85);
            --border-color: rgba(239, 68, 68, 0.3);
            --accent-red: #ef4444;
            --accent-cyan: #00d2ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .report-container {
            width: 90%;
            max-width: 520px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(239, 68, 68, 0.15);
            box-sizing: border-box;
        }

        .report-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .report-title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 10px;
            color: #ffffff;
        }

        .report-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .status-box {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.6;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent-red);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-action {
            display: inline-block;
            background: linear-gradient(135deg, #00d2ff, #10b981);
            color: #050a09;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="report-container">
        <div id="iconContainer" class="report-icon">🚨</div>
        <h2 id="titleText" class="report-title">Reporting Unauthorized Login</h2>
        <p id="descText" class="report-desc">Verifying security token and locking account immediately...</p>

        <div id="statusBox" class="status-box">
            <div id="spinner" class="spinner"></div>
            <p id="statusMessage" style="margin: 0;">Processing immediate account block request...</p>
        </div>

        <div id="actionContainer">
            <a href="login.html" class="btn-action">Return to Login Page</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            const email = params.get("email");
            const token = params.get("token");

            const statusBox = document.getElementById("statusBox");
            const statusMessage = document.getElementById("statusMessage");
            const spinner = document.getElementById("spinner");
            const iconContainer = document.getElementById("iconContainer");
            const titleText = document.getElementById("titleText");
            const descText = document.getElementById("descText");

            if (!email || !token) {
                spinner.style.display = "none";
                iconContainer.textContent = "⚠️";
                titleText.textContent = "Invalid Security Link";
                descText.textContent = "The security report link is incomplete or invalid.";
                statusMessage.innerHTML = "<span style='color: #f87171;'>Missing email or security token. If you suspect unauthorized activity, please contact support.</span>";
                return;
            }

            try {
                const apiHost = window.location.origin;
                const response = await fetch(`${apiHost}/api/auth/report-block?email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`, {
                    method: "GET",
                    headers: { "Content-Type": "application/json" }
                });

                const data = await response.json();
                spinner.style.display = "none";

                if (response.ok && data.success) {
                    iconContainer.textContent = "🔒";
                    titleText.textContent = "Account Blocked Immediately";
                    descText.textContent = `Security block activated for ${email}`;
                    
                    statusBox.style.borderColor = "rgba(239, 68, 68, 0.5)";
                    statusBox.style.background = "rgba(239, 68, 68, 0.12)";
                    statusMessage.innerHTML = `<strong style="color: #f87171; font-size: 15px;">${data.message || "Your account has been BLOCKED and all active sessions have been terminated."}</strong><br><br><span style="font-size: 13px; color: #cbd5e1;">Future login attempts will be blocked until verified. If you need to unblock your account, please contact support at <a href="mailto:kvaultx.security@gmail.com" style="color: #00d2ff;">kvaultx.security@gmail.com</a>.</span>`;
                } else {
                    iconContainer.textContent = "⚠️";
                    titleText.textContent = "Report Processing Warning";
                    descText.textContent = data.message || "Failed to process security block.";
                    statusMessage.innerHTML = `<span style="color: #f87171;">${data.message || "Invalid or expired report link."}</span>`;
                }
            } catch (err) {
                spinner.style.display = "none";
                iconContainer.textContent = "⚠️";
                titleText.textContent = "Connection Error";
                descText.textContent = "Unable to connect to security server.";
                statusMessage.innerHTML = "<span style='color: #f87171;'>Network error. Please check your internet connection and try again or email support.</span>";
            }
        });
    </script>
</body>
</html>
