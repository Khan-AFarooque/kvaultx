<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Password | KvaultX</title>
    <link rel="stylesheet" href="../css/signup.css">
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #0c1916 0%, #050a09 100%) !important;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* Top banner marquee style */
        .top-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 38px;
            background: linear-gradient(135deg, #0b1613, #050a09) !important;
            border-bottom: 1px solid rgba(22, 48, 42, 0.4) !important;
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 1000;
        }
        
        .top-banner-track {
            display: flex;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
        }
        
        .top-banner-track span {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            padding: 0 40px;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Textarea and select styling */
        textarea, select, input[type="date"] {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid #16302a !important;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background: #080f0d !important;
            color: #ffffff !important;
            outline: none;
            transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
        }

        textarea:focus, select:focus, input[type="date"]:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2) !important;
            transform: translateY(-1px);
        }

        button {
            background: #10b981 !important;
            color: #050a09 !important;
        }

        button:hover {
            background: #059669 !important;
            box-shadow: 0 10px 24px rgba(16, 185, 129, 0.25) !important;
        }

        /* Password strength indicator styles */
        #passwordStrength {
            font-weight: 600;
        }
        .weak { color: #ef4444; }
        .medium { color: #f39c12; }
        .strong { color: #10b981; }
    </style>
</head>
<body class="signup-page">

    <div class="top-banner">
        <div class="top-banner-track">
            <span>🔐 Saving your passwords is saving your digital identity 🔐</span>
            <span>🔐 Saving your passwords is saving your digital identity 🔐</span>
        </div>
    </div>

    <div class="signup-wrapper" style="margin-top: 60px; margin-bottom: 60px;">
        <div class="signup-card" style="max-width: 460px;">

            <div class="signup-brand">
                <div class="signup-brand-icon" aria-hidden="true">🔑</div>
                <h2 id="formTitle">Add Credential</h2>
                <p class="signup-subtitle">Securely store your login credentials</p>
            </div>

            <form id="vaultForm" style="background: transparent; border: none; padding: 0; box-shadow: none; backdrop-filter: none; animation: none; width: 100%;">
                
                <div class="field-group">
                    <label class="field-label" for="vaultTitle">Title</label>
                    <input type="text" id="vaultTitle" placeholder="Title (e.g. Google, GitHub)" required>
                </div>

                <div class="field-group">
                    <label class="field-label" for="vaultUsername">Username / Email</label>
                    <input type="text" id="vaultUsername" placeholder="Username / Email">
                </div>
                
                <div class="field-group">
                    <label class="field-label" for="vaultPassword">Password</label>
                    <div class="password-box">
                        <input type="password" id="vaultPassword" placeholder="Password" required>
                        <span id="toggleVaultPass" class="toggle-eye">👁</span>
                    </div>
                    <p id="passwordStrength"></p>
                </div>
                
                <div class="field-group">
                    <label class="field-label" for="vaultUrl">Website URL</label>
                    <input type="text" id="vaultUrl" placeholder="Website URL (e.g. https://google.com)">
                </div>

                <div class="field-group">
                    <label class="field-label" for="vaultNotes">Notes (Optional)</label>
                    <textarea id="vaultNotes" placeholder="Write any notes here..." style="height: 90px; resize: none;"></textarea>
                </div>

                <div class="field-group">
                    <label class="field-label" for="vaultCategory">Category</label>
                    <select id="vaultCategory">
                        <option value="Uncategorized">Uncategorized</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Social">Social</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="vaultTags">Tags</label>
                    <input type="text" id="vaultTags" placeholder="Tags (comma separated, e.g. dev, work)">
                </div>
                
                <div class="field-group">
                    <label class="field-label" for="vaultExpiry">Password Expiry (Optional)</label>
                    <input type="date" id="vaultExpiry">
                </div>

                <button id="saveVaultBtn" type="submit">Save to Vault</button>
                <button id="cancelVaultBtn" type="button" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff; margin-top: 10px;">Cancel</button>
            </form>

        </div>
    </div>

    <footer class="add-password-footer" style="text-align: center; padding: 16px; font-size: 13px; color: rgba(255, 255, 255, 0.5); border-top: 1px solid rgba(255, 255, 255, 0.08); margin-top: 40px; position: relative; bottom: 0; width: 100%;">
        © 2026 KvaultX. All rights reserved.
    </footer>

    <script src="../js/utils.js"></script>
    <script src="../js/password.js"></script>
</body>
</html>
